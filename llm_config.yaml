# ---------------------------------------------------------------------------
# Provider-agnostic LLM configuration for the Autonomous ML Research Engineer
# ---------------------------------------------------------------------------
#
# This file is loaded by ``research_engineer.llm.factory.load_config()``.
# Override the path with the ``RE_LLM_CONFIG`` environment variable.
#
# `${VAR}` placeholders are expanded against the process environment, so
# secrets (API keys) never need to be committed.
#
# Switching a provider or model for an agent is a *config-only* change:
# no source edits are required.
#
# Agent-specific model assignments (terminal-first autonomous coding agent):
#   - qwen3-coder-next:cloud  -> coding (CodingAgent, TaskAgent impl phase)
#   - glm-5.2:cloud           -> reasoning (Research/Planner/Literature/Eval)
#   - minimax-m3:cloud        -> orchestration (TaskAgent, ResearchLoopAgent)
# ---------------------------------------------------------------------------

# Provider used when an agent config omits ``provider``.
default_provider: ollama
# Model used when an agent config omits ``model`` (and the provider does
# not declare its own ``default_model``).
default_model: glm-5.2:cloud

# --- Provider connection settings ----------------------------------------
providers:
  ollama:
    # Maps to OllamaCloudProvider (see llm/ollama_provider.py).
    type: ollama
    # Ollama Cloud OpenAI-compatible base URL. Override with OLLAMA_BASE_URL.
    base_url: https://api.olama.cloud
    # API key. Leave as ${OLLAMA_API_KEY} so the secret stays out of git.
    api_key: ${OLLAMA_API_KEY}
    # Model used when a request does not specify one.
    default_model: glm-5.2:cloud
    # Per-request HTTP timeout, in seconds.
    timeout: 60

# --- Per-agent model assignments -----------------------------------------
#
# Each entry maps an agent class name to a (provider, model) pair.
# To use a different model for an agent, change the ``model`` value here
# only. Add new providers under ``providers:`` above to mix vendors.
#
# The router resolves a model per agent via research_engineer.llm.router.
agents:
  # --- Reasoning agents (glm-5.2:cloud) ---------------------------------
  ResearchAgent:
    provider: ollama
    model: glm-5.2:cloud
  ExperimentPlannerAgent:
    provider: ollama
    model: glm-5.2:cloud
  LiteratureAgent:
    provider: ollama
    model: glm-5.2:cloud
  EvaluationAgent:
    provider: ollama
    model: glm-5.2:cloud
  MemoryAgent:
    provider: ollama
    model: glm-5.2:cloud
  ArchitectAgent:
    provider: ollama
    model: glm-5.2:cloud
  ReviewerAgent:
    provider: ollama
    model: glm-5.2:cloud
  FailureAnalyzer:
    provider: ollama
    model: glm-5.2:cloud
  RepairStrategist:
    provider: ollama
    model: glm-5.2:cloud

  # --- Phase 15: Research workflow agents (glm-5.2:cloud for reasoning) ---
  LiteratureDiscoveryAgent:
    provider: ollama
    model: glm-5.2:cloud
  KnowledgeSynthesisAgent:
    provider: ollama
    model: glm-5.2:cloud
  HypothesisGeneratorAgent:
    provider: ollama
    model: glm-5.2:cloud
  ResearchExperimentPlannerAgent:
    provider: ollama
    model: glm-5.2:cloud
  ResultAnalyzerAgent:
    provider: ollama
    model: glm-5.2:cloud
  ReportGeneratorAgent:
    provider: ollama
    model: glm-5.2:cloud

  # --- Phase 15: Orchestration (minimax-m3:cloud) ---
  ExperimentExecutorAgent:
    provider: ollama
    model: minimax-m3:cloud
  ResearchOrchestrator:
    provider: ollama
    model: minimax-m3:cloud

  # --- Coding agent (qwen3-coder-next:cloud) ----------------------------
  CodingAgent:
    provider: ollama
    model: qwen3-coder-next:cloud

  # --- Orchestration agents (minimax-m3:cloud) --------------------------
  TaskAgent:
    provider: ollama
    model: minimax-m3:cloud
  ResearchLoopAgent:
    provider: ollama
    model: minimax-m3:cloud
  ExperimentAgent:
    provider: ollama
    model: minimax-m3:cloud
  TestAgent:
    provider: ollama
    model: minimax-m3:cloud

  # --- Repository analysis (rule-based by default; LLM optional) -------
  RepositoryAgent:
    provider: ollama
    model: glm-5.2:cloud